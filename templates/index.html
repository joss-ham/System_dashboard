<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Health</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --accent-blue: #38bdf8;
            --danger: #ef4444;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 { color: var(--accent-blue); margin-bottom: 5px; }

        /* Dashboard Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid #334155;
            transition: transform 0.2s;
        }

        .card:hover { transform: translateY(-5px); }

        .card h3 { margin: 0; font-size: 0.9rem; color: #94a3b8; text-transform: uppercase; }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            display: block;
            margin: 10px 0;
            color: var(--text-main);
        }

        /* Chart Section */
        .chart-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
        }

        #warning-text {
            height: 24px;
            color: var(--danger);
            font-weight: bold;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div style="width: 600px; margin: auto;">
        <h2>Real Time System Stats</h2>
        <canvas id="healthChart"></canvas>
    </div>

    <div class="stats-grid">
        <div class="card">
            <h3>CPU Usage</h3>
            <span class="stat-value"><span id="cpu-text">0</span>%</span>
        </div>
        <div class="card">
            <h3>RAM Usage</h3>
            <span class="stat-value"><span id="ram-text">0</span>%</span>
        </div>
        <div class="card">
            <h3>Disk Usage</h3>
            <span class="stat-value"><span id="disk-text">0</span>%</span>
        </div>
    </div>

    <p id="warning-text">System warnings will appear here</p>

    <script>
        const ctx = document.getElementById('healthChart').getContext('2d');
        const chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['CPU', 'RAM', 'DISK'],
            datasets: [{
                label: 'Usage %',
                data: [0, 0, 0],
                backgroundColor: ['#38bdf8', '#818cf8', '#c084fc'],
                borderRadius: 8
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                y: { 
                    beginAtZero: true, 
                    max: 100,
                    grid: { color: '#334155' },
                    ticks: { color: '#94a3b8' }
                },
                x: { ticks: { color: '#94a3b8' } }
            }
        }
    });

        async function updateStats() {
            try{
                const response = await fetch('/api/stats');
                const data = await response.json();
                // This tells the browser: "Find the span with this ID and change its text"
                document.getElementById('cpu-text').innerText = data.cpu_usage;
                document.getElementById('ram-text').innerText = data.ram_usage;
                document.getElementById('disk-text').innerText = data.disk_usage;

                chart.data.datasets[0].data = [data.cpu_usage, data.ram_usage, data.disk_usage];
                chart.update();
                
                if (data.cpu_usage > 80 || data.ram_usage > 80 || data.disk_usage > 80) {
                    document.getElementById('warning-text').innerText = 'Warning: High resource usage!';
                    document.getElementById('warning-text').style.color = 'red';
                } else {
                    document.getElementById('warning-text').innerText = '';
                }
            
            }catch (error) {
                console.error('Error fetching stats:', error);
            } 
     }
    updateStats();
    setInterval(updateStats, 2000);
    </script>
    
</body>
</html>
